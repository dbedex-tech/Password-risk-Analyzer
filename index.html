<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Checker</title>
  <link rel="stylesheet" href="passwordchecker.css" />
</head>

<body>
  <section class="main">
    <div class="header">
    <h1>
    Password Risk Analyzer
  </h1>
  <p>Test the strength of your password</p>
  </div>
  
  <div class="form">
    <form  method="get" accept-charset="utf-8">
      <label for="password"></label>
      <input type="password" class="form-password"  name="password" id="check-password" placeholder="Enter Password" required/>
      <div class="btns">
         <button type="button" class="btn" id="test-btn" onclick="document.getElementById('feedback-modal').showModal()">Test Now</button>
    <button type="button" class="btn" onclick="document.getElementById('feedback-modal').showModal()">Check Safety</button>
      </div>
    </form>
    <dialog class="pop-up" id="feedback-modal">
      <div id="response" open>
        <h2>Results here ...</h2>
        <hr />
        <div class="btns">
          <button type="button" class="pop-btn"  onclick="document.getElementById('feedback-modal').close()"> Close</button>
        </div>
      </div>
    </dialog>
  </div>
  </section>

</body>

</html>
